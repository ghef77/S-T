        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji"; }
        #data-table { border-collapse: collapse; border-spacing: 0; margin-bottom: 50px; width: 100%; }
        #data-table th, #data-table td { border: 1px solid #000; }
        #data-table thead { position: sticky; top: 0; z-index: 10; background-color: #15803d; }
        #data-table tfoot { position: sticky; bottom: 0; z-index: 10; background-color: white; border-top: 2px solid #ddd; }
        .sync-pending-animation { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%{opacity:1;} 50%{opacity:.5;} 100%{opacity:1;} }
        .message-box { position: fixed; top: 2rem; left: 50%; transform: translateX(-50%); padding: 1rem 1.5rem; border-radius: .5rem; box-shadow: 0 4px 12px rgba(0,0,0,.15); z-index:100; opacity:0; transition: opacity .5s, transform .5s; }
        .message-box.show { opacity:1; transform: translateX(-50%) translateY(0); }
        .message-box.success { background-color:#d1fae5; color:#065f46; }
        .message-box.info { background-color:#dbeafe; color:#1e40af; }
        #button-bar { position: absolute; top:8px; right:8px; z-index:20; }
        #data-table th:first-child, #data-table td:first-child { position: sticky; left:0; z-index:2; background:#fff; }
        #data-table thead th:first-child { z-index:3; }
        td.editable-cell:empty::after { content: attr(data-label); color:#9ca3af; font-weight: normal; }
        td.editable-cell[data-label="DDN"]:empty::after { content: 'JJ/MM/YYYY'; color:#9ca3af; font-weight: normal; }
        tr.selected-row { background-color:#FEF3C7; }

        const appState = { isLoggedIn: false, masterSource: 'supabase', dataHash: null, localData: null, serverColumns: null };
let isDirty=false, saveTimeout=null, history=[], historyDebounceTimeout=null, isTyping=false, lastEditAt=0, typingTimer=null, isSyncing=false;
let lastFocusInfo = null; // remembers the last edited cell and caret offset
let lastCellPos = null; // simple row/cell index memory
function captureSimplePos(){
  const active = document.activeElement;
  if (!(active && active.tagName === 'TD' && active.isContentEditable)) return;
  const rowEl = active.closest('tr');
  const tbody = document.getElementById('table-body');

  if (lastCellPos) { log(`captureSimplePos -> row=${lastCellPos.rowIndex}, cell=${lastCellPos.cellIndex}`); }
}
function focusCellByPos(pos){
  try{
    if (!pos) return false;
    const tbody = document.getElementById('table-body');
    const row = tbody.querySelectorAll('tr')[pos.rowIndex];
    if (!row) return false;
    const cell = row.cells[pos.cellIndex];
    if (!cell) return false;
    log(`focusCellByPos -> trying row=${pos.rowIndex}, cell=${pos.cellIndex}`);
    setCaretAt(cell, null); // focus + place caret at end
    try {
      cell.dispatchEvent(new MouseEvent('pointerdown', { bubbles:true }));
      cell.dispatchEvent(new MouseEvent('mousedown', { bubbles:true }));
      cell.dispatchEvent(new MouseEvent('mouseup', { bubbles:true }));
      cell.click();
    } catch(_) {}
    log(`focusCellByPos -> active=${document.activeElement===cell}`);
    return document.activeElement === cell;
  } catch(_) { return false; }
}
        window.addEventListener('beforeunload', function (e) { if (isDirty) { e.preventDefault(); e.returnValue = 'Des modifications non sauvegardées seront perdues si vous quittez.'; } });

        function log(message, type = 'info') { console.log(`[${new Date().toLocaleTimeString()}] ${type.toUpperCase()}: ${message}`); }
        function updateStatus(message, type = 'pending') { const el=document.getElementById('sync-status'); el.textContent=message; el.className=`sync-pending-animation px-1 py-0.5 rounded-full text-[10px] font-bold border-2 ${getSyncStatusClasses(type)}`; }
        function getSyncStatusClasses(type){ switch(type){ case 'success': return 'bg-green-100 text-green-700 border-green-500'; case 'error': return 'bg-red-100 text-red-700 border-red-500'; case 'saving': return 'bg-blue-100 text-blue-700 border-blue-500 sync-pending-animation'; default: return 'bg-yellow-100 text-yellow-700 border-yellow-500 sync-pending-animation'; } }
        function updateLastSaveTime(){ document.getElementById('last-save-time').textContent = new Date().toLocaleTimeString(); }
        function updateClock(){ document.getElementById('current-time').textContent = new Date().toLocaleTimeString(); }
        function updateUndoButtonState(){ document.getElementById('undo-button').disabled = history.length <= 1; }

        function getCaretOffsetWithin(el){
          try {
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return null;
            const range = sel.getRangeAt(0);
            if (!el.contains(range.startContainer)) return null;
            // Create a temporary range to compute character offset from start of el
            const preRange = range.cloneRange();
            preRange.selectNodeContents(el);
            preRange.setEnd(range.startContainer, range.startOffset);
            return preRange.toString().length;
          } catch(_) { return null; }
        }

        function setCaretAt(el, offset){
          try {
            el.focus();
            const selection = window.getSelection();
            selection.removeAllRanges();
            const range = document.createRange();
            // Walk text nodes to place the caret at the desired char offset
            let remaining = (typeof offset === 'number' && offset >= 0) ? offset : null;
            const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
            let node = walker.nextNode();
            if (remaining === null) {
              // fallback: place at end
              let lastNode = null;
              while (node) { lastNode = node; node = walker.nextNode(); }
              if (lastNode) {
                range.setStart(lastNode, lastNode.textContent.length);
                range.collapse(true);
                selection.addRange(range);
              }
              return;
            }
            while (node) {
              const len = node.textContent.length;
              if (remaining <= len) {
                range.setStart(node, remaining);
                range.collapse(true);
                selection.addRange(range);
                return;
              }
              remaining -= len;
              node = walker.nextNode();
            }
            // if we ran out of nodes, place at end
            const endNode = el.lastChild;
            if (endNode && endNode.nodeType === Node.TEXT_NODE) {
              range.setStart(endNode, endNode.textContent.length);
            } else {
              range.selectNodeContents(el);
              range.collapse(false);
            }
            selection.addRange(range);
          } catch(_) { /* no-op */ }
        }

        function captureFocusInfo(){
          const active = document.activeElement;
          if (!(active && active.tagName === 'TD' && active.isContentEditable)) return;
          const row = active.closest('tr');
          const tbody = document.getElementById('table-body');
          const rowIndex = Array.from(tbody.querySelectorAll('tr')).indexOf(row);
          const colLabel = active.getAttribute('data-label') || '';
          const rowKey = row ? row.dataset.key || null : null;
          const caret = getCaretOffsetWithin(active);
          lastFocusInfo = { rowKey, rowIndex, colLabel, caret };
        }

        function focusCellFromInfo(info){
          if (!info) return false;
          const tbody = document.getElementById('table-body');
          let targetRow = null;
          if (info.rowKey) {
            targetRow = Array.from(tbody.querySelectorAll('tr')).find(tr => tr.dataset.key === String(info.rowKey));
          }
          if (!targetRow) {
            const rows = tbody.querySelectorAll('tr');
            targetRow = rows[info.rowIndex] || null;
          }
          if (!targetRow) return false;
          const cells = Array.from(targetRow.querySelectorAll('td'));
          // skip first two fixed cells (No, Effacer)
          const editableCells = cells.slice(2);
          const cell = editableCells.find(td => (td.getAttribute('data-label')||'') === info.colLabel) || null;
          if (!cell) return false;
          // Ensure focus and caret placement
          try { cell.scrollIntoView({ block: 'center', inline: 'nearest' }); } catch(_) {}
          let placed=false;
          try { setCaretAt(cell, null); placed=true; } catch(_) {}
          if (!placed) { setTimeout(() => { try { setCaretAt(cell, null); } catch(_) {} }, 50); }
          // Fallback: if selection API failed, at least focus the cell
          if (document.activeElement !== cell) { try { cell.focus(); } catch(_) {} }
          return true;
        }

        // ===== Helpers & constants (DRY) =====
        const BOLD_HEADERS = ['nom_prénom','pec finale','diagnostic_initial'];
        function getHeaders(){
          return Array.from(document.querySelectorAll('#data-table thead th')).slice(2).map(th=>th.textContent);
        }
        function createDeleteCell(row){
          const deleteCell=document.createElement('td');
          deleteCell.className='p-0 text-center';
          deleteCell.setAttribute('data-label','Effacer');
          const sel=document.createElement('input');
          sel.type='checkbox';
          sel.className='m-1 align-middle';
          sel.addEventListener('change',()=>{ row.classList.toggle('selected-row', sel.checked); });
          const deleteButton=document.createElement('button');
          deleteButton.className='text-red-500 hover:text-red-700 font-bold p-2 transition-colors';
          deleteButton.innerHTML='🗑️';
          deleteButton.onclick=(e)=>{
            e.stopPropagation();
            const selected = Array.from(document.querySelectorAll('#table-body tr.selected-row'));
            if (selected.length > 0) {
              // Multiple rows selected: confirm before deleting
              promptKeyConfirm(`Supprimer ${selected.length} ligne(s) ?`, () => deleteRows(selected));
            } else {
              // Single row via trash icon: delete immediately without confirmation
              deleteRows([row]);
            }
          };
          const wrap=document.createElement('div');
          wrap.className='flex items-center justify-center gap-1';
          wrap.appendChild(sel); wrap.appendChild(deleteButton);
          deleteCell.appendChild(wrap);
          return deleteCell;
        }
        function createEditableCell(header, value=''){
          const cell=document.createElement('td');
          const dbKey=header; // names are identical (no mapping)
          cell.textContent=value||'';
          cell.contentEditable=true;
          cell.className='py-2 px-2 md:px-4 editable-cell';
          cell.setAttribute('data-label',header);
          cell.setAttribute('data-dbkey',dbKey);
          if(BOLD_HEADERS.includes(header.toLowerCase())){
            cell.style.fontWeight='bold';
            cell.style.color='#000';
          }
          cell.setAttribute('tabindex','0');
          cell.oninput=()=>{
            saveStateToHistory();
            saveLocalDraft();
            markEdited();
            // keep caret/position updated while typing
            captureFocusInfo();
            captureSimplePos();
          };
          cell.addEventListener('keyup', (e) => {
            // update caret after navigation keys
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End','PageUp','PageDown'].includes(e.key)) {
              captureFocusInfo();
              captureSimplePos();
            }
          });
          return cell;
        }

        // Ensure DDN column exists visually even if an older HTML version is served (Live Server/mobile cache)
        function ensureDDNHeader(){
          try {
            const theadRow = document.querySelector('#data-table thead tr');
            if (!theadRow) return;
            const labels = Array.from(theadRow.children).map(th=>th.textContent.trim());
            if (labels.includes('DDN')) return; // already there

            // Create the DDN header cell
            const th = document.createElement('th');
            th.setAttribute('scope','col');
            th.className = 'py-2 px-2 md:px-4';
            th.textContent = 'DDN';

            // Insert right after Nom_Prénom if present, else before Diagnostic_initial, else at the end
            let insertIndex = labels.indexOf('Nom_Prénom');
            if (insertIndex !== -1) {
              theadRow.insertBefore(th, theadRow.children[insertIndex + 1]);
            } else {
              const diagIdx = labels.indexOf('Diagnostic_initial');
              if (diagIdx !== -1) theadRow.insertBefore(th, theadRow.children[diagIdx]);
              else theadRow.appendChild(th);
            }

            // For each body row, insert a new editable DDN cell at the same index
            const headersNow = Array.from(document.querySelectorAll('#data-table thead th')).slice(2).map(th=>th.textContent);
            const ddnPos = headersNow.indexOf('DDN');
            if (ddnPos !== -1) {
              document.querySelectorAll('#table-body tr').forEach(tr => {
                const cell = createEditableCell('DDN', '');
                // Insert after the first two fixed cells (No, Effacer) + ddnPos offset
                const insertAt = 2 + ddnPos;
                const ref = tr.cells[insertAt];
                if (ref) tr.insertBefore(cell, ref); else tr.appendChild(cell);
              });
            }

            // Adjust tfoot colspan to match new column count
            const tfootLast = document.querySelector('#data-table tfoot td:last-child');
            const totalCols = document.querySelectorAll('#data-table thead th').length;
            if (tfootLast) {
              // first two tds in tfoot row are No/Effacer holders; last td should span the remainder
              const span = Math.max(0, totalCols - 2);
              tfootLast.setAttribute('colspan', String(span));
            }
          } catch(e) { /* noop */ }
        }

        // Align table headers with server column keys (case-insensitive)
        function reconcileHeadersWithServer() {
          try {
            if (!appState.serverColumns || appState.serverColumns.length === 0) return;
            const server = appState.serverColumns;
            const theadTh = Array.from(document.querySelectorAll('#data-table thead th')).slice(2);
            theadTh.forEach((th) => {
              const label = th.textContent;
              if (server.includes(label)) return; // exact match OK
              const found = server.find(k => k.toLowerCase() === label.toLowerCase());
              if (found) {
                th.textContent = found; // normalize header to the exact server key
              }
            });
          } catch (e) { /* no-op */ }
        }
        function showMessage(message, type='success'){ const box=document.getElementById('message-box'); const txt=document.getElementById('message-text'); if(window._msgTimer) clearTimeout(window._msgTimer); box.classList.remove('show'); txt.textContent=message; box.className=`message-box ${type}`; void box.offsetWidth; box.classList.add('show'); box.classList.remove('hidden'); window._msgTimer=setTimeout(()=>{ box.classList.remove('show'); setTimeout(()=>box.classList.add('hidden'), 500); }, 3000); }
        function getFormattedDate(){ const d=new Date(); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}` }
        function generateDataHash(data){ return JSON.stringify(data.rows.map(r=>({...r,[supabaseConfig.primaryKeyColumn]:undefined}))).split('').reduce((a,b)=>{a=((a<<5)-a)+b.charCodeAt(0);return a&a;},0).toString(16) }

        function collectTableData(){ const headers=Array.from(document.querySelectorAll('#data-table thead th')).slice(2).map(th=>th.textContent); const rows=[]; document.querySelectorAll('#data-table tbody tr').forEach(rowEl=>{ const rowData={}; if(rowEl.dataset.key){ rowData[supabaseConfig.primaryKeyColumn]=rowEl.dataset.key; } const cells=Array.from(rowEl.querySelectorAll('td')).slice(2); cells.forEach((td,i)=>{ const label=headers[i]; const key=label; rowData[key]=td.textContent===''?null:td.textContent; }); rows.push(rowData); }); return { headers, rows }; }
        function saveStateToHistory(){ if(historyDebounceTimeout) clearTimeout(historyDebounceTimeout); historyDebounceTimeout=setTimeout(()=>{ const s=collectTableData(); const last=history[history.length-1]; if(!last||generateDataHash(s)!==generateDataHash(last)){ history.push(s); if(history.length>10) history.shift(); updateUndoButtonState(); log('État de l’historique enregistré.'); } },500); }
        function saveLocalDraft(){ try{ localStorage.setItem('staffTableDraft', document.getElementById('data-table').outerHTML); }catch(e){} }
        function restoreLocalDraft(){ try{ const draft=localStorage.getItem('staffTableDraft'); if(draft){ const el=document.getElementById('data-table'); if(el){ el.outerHTML=draft; log('Brouillon local restauré.'); } } }catch(e){} }
        function markEdited(){ isDirty=true; isTyping=true; lastEditAt=Date.now(); if(typingTimer) clearTimeout(typingTimer); typingTimer=setTimeout(()=>{isTyping=false;},1200); }
        function startPeriodicSync(){ if(window._syncTimer) clearInterval(window._syncTimer); window._syncTimer=setInterval(async()=>{ if(isTyping) return; if(Date.now()-lastEditAt<3000) return; const modal=document.getElementById('confirmation-modal'); if(modal && !modal.classList.contains('hidden')) return; if(isSyncing) return; if(!isDirty) return; try{ isSyncing=true; log('Auto-sync (5s, idle) vers Supabase…'); await syncToMaster(false); } finally { isSyncing=false; } },5000); }

        function loadTableData(data){
          if(!data){ log('Structure invalide','error'); return false; }
          const tbody=document.getElementById('table-body');
          tbody.innerHTML='';
          const headers=getHeaders();
          data.forEach((rowData,index)=>{
            const row=document.createElement('tr');
            row.className='bg-white hover:bg-gray-100 transition-colors cursor-pointer';
            if(rowData[supabaseConfig.primaryKeyColumn]) row.dataset.key=rowData[supabaseConfig.primaryKeyColumn];

            // No
            const numCell=document.createElement('td');
            numCell.textContent=index+1;
            numCell.className='py-2 px-2 md:px-4 font-bold text-gray-800 whitespace-nowrap';
            numCell.setAttribute('data-label','No');
            row.appendChild(numCell);

            // Effacer + sélection
            row.appendChild(createDeleteCell(row));

            // Data cells
            headers.forEach(header=>{
              const value = rowData[header] || '';
              row.appendChild(createEditableCell(header, value));
            });

            tbody.appendChild(row);
          });
          log('Données du tableau chargées.','success');
          appState.localData=collectTableData();
          appState.dataHash=generateDataHash(appState.localData);
          document.dispatchEvent(new CustomEvent('table:reloaded'));
          log('table:reloaded dispatched');
          return true;
        }

        async function addRow(){
          const tbody=document.getElementById('table-body');
          const row=document.createElement('tr');
          row.className='bg-white hover:bg-gray-100 transition-colors cursor-pointer';

          // No
          const numCell=document.createElement('td');
          numCell.textContent=tbody.children.length+1;
          numCell.className='py-2 px-2 md:px-4 font-bold text-gray-800 whitespace-nowrap';
          numCell.setAttribute('data-label','No');
          row.appendChild(numCell);

          // Effacer + sélection
          row.appendChild(createDeleteCell(row));

          // Date de saisie (pré-remplie)
          const dateCell=createEditableCell('Date de saisie', getFormattedDate());
          row.appendChild(dateCell);

          // Remaining headers after the first data column
          const headers = getHeaders().slice(1); // skip 'Date de saisie' because we already added it
          headers.forEach(header=>{ row.appendChild(createEditableCell(header, '')); });

          tbody.appendChild(row);
          markEdited();
        }

        async function deleteRows(rows){ const keys=rows.map(r=>r.dataset.key).filter(Boolean); try{ if(keys.length>0){ const { error } = await supabase.from(supabaseConfig.tableName).delete().in(supabaseConfig.primaryKeyColumn, keys); if(error) throw error; log(`Supprimé ${keys.length} ligne(s) côté serveur.`,'success'); } rows.forEach(r=>r.remove()); document.querySelectorAll('#table-body tr').forEach((tr,idx)=>{ const noCell=tr.querySelector('td:first-child'); if(noCell) noCell.textContent=idx+1; tr.classList.remove('selected-row'); }); saveStateToHistory(); saveLocalDraft(); markEdited(); updateStatus('Ligne(s) supprimée(s)','success'); await pullFromMaster(); } catch(err){ log('Erreur lors de la suppression: '+err.message,'error'); updateStatus('Erreur de suppression','error'); } }

        async function fetchInitialData(){ log('Chargement des données (full fetch)...'); updateStatus('Connexion...'); try{ const { data, error } = await supabase.from(supabaseConfig.tableName).select('*').order(supabaseConfig.primaryKeyColumn, { ascending: true }); if(error) throw error; if(Array.isArray(data) && data.length>0){ appState.serverColumns = Object.keys(data[0]); }
                reconcileHeadersWithServer();
                ensureDDNHeader();
                if(loadTableData(data)){ updateStatus('Synchronisé','success'); updateLastSaveTime(); saveStateToHistory(); }
            } catch(e){ log('Erreur lors du chargement des données : '+e.message,'error'); updateStatus('Erreur de connexion','error'); }
        }

        async function syncToMaster(isManualSave=false){
          const modal=document.getElementById('confirmation-modal');
          if(modal && !modal.classList.contains('hidden')){ log('Sync ignorée: modale ouverte.'); return; }
          // Remember which cell and caret position were active before saving
          captureFocusInfo();
          captureSimplePos();
          if(isManualSave && saveTimeout){ clearTimeout(saveTimeout); }
          const current=collectTableData();
          const currentHash=generateDataHash(current);
          let rowsForSync=current.rows.map(row=>{ if(!appState.serverColumns) return row; const allowed=new Set([supabaseConfig.primaryKeyColumn, ...appState.serverColumns]); const filtered={}; for(const k in row){ if(allowed.has(k)) filtered[k]=row[k]; } return filtered; });
          if(!isManualSave && currentHash===appState.dataHash){ log('Pas de changement détecté.'); isDirty=false; updateStatus('Synchronisé','success'); return; }
          log('Synchronisation des données vers Supabase...');
          updateStatus('Sauvegarde en cours...','saving');
          isDirty=false;
          try{
            const updates=rowsForSync.filter(r=>r[supabaseConfig.primaryKeyColumn]);
            const inserts=rowsForSync.filter(r=>!r[supabaseConfig.primaryKeyColumn]);
            let error=null;
            if(inserts.length>0){
              const { error: insertError } = await supabase.from(supabaseConfig.tableName).insert(inserts);
              if(insertError) error=insertError;
            }
            if(updates.length>0 && !error){
              const { error: updateError } = await supabase.from(supabaseConfig.tableName).upsert(updates, { onConflict: supabaseConfig.primaryKeyColumn });
              if(updateError) error=updateError;
            }
            if(error) throw error;
            updateStatus('Sauvegardé','success');
            updateLastSaveTime();
            log(`syncToMaster -> set restore listener (lastCellPos=${JSON.stringify(lastCellPos)}, lastFocusInfo.col=${lastFocusInfo?lastFocusInfo.colLabel:''})`);
            await new Promise((resolve) => {
              const restoreOnce = () => {
                log('syncToMaster -> table:reloaded caught; attempting focus restore');
                document.removeEventListener('table:reloaded', restoreOnce);
                // Try simple row/cell index first ("as simple as this")
                if (!focusCellByPos(lastCellPos)) {
                  // Fallback to the richer label+caret based restore
                  if (!focusCellFromInfo(lastFocusInfo)) {
                    setTimeout(() => { if (!focusCellByPos(lastCellPos) && !focusCellFromInfo(lastFocusInfo)) { setTimeout(() => { focusCellByPos(lastCellPos) || focusCellFromInfo(lastFocusInfo); }, 250); } }, 50);
                  }
                }
                // Final delayed retry in case layout settles after a tick
                setTimeout(() => { focusCellByPos(lastCellPos) || focusCellFromInfo(lastFocusInfo); }, 300);
                resolve();
              };
              document.addEventListener('table:reloaded', restoreOnce, { once: true });
              fetchInitialData();
            });
          } catch(e){
            log('Erreur de sauvegarde : '+e.message,'error');
            updateStatus('Erreur de sauvegarde','error');
          }
        }

        async function pullFromMaster(){ log('Récupération des dernières données...'); await fetchInitialData(); }
        function handleRealtimeUpdate(){
          log('Mise à jour en temps réel reçue.');
          if (isDirty) { log('Modifs locales en attente, on ignore.'); return; }
          // Try to preserve focus across realtime-driven reload as well
          captureFocusInfo();
          captureSimplePos();
          const onReload = () => {
            log('realtime -> table:reloaded caught; attempting focus restore');
            document.removeEventListener('table:reloaded', onReload);
            focusCellByPos(lastCellPos) || focusCellFromInfo(lastFocusInfo);
          };
          document.addEventListener('table:reloaded', onReload, { once: true });
          fetchInitialData();
        }
        // Also capture simple cell position on focusin globally
        document.addEventListener('focusin', (e) => {
          if (e.target && e.target.tagName === 'TD' && e.target.contentEditable === 'true') {
            captureSimplePos();
          }
        });
        function setupRealtimeSubscription(){ if(realtimeSubscription){ try{ supabase.removeChannel(realtimeSubscription);}catch(e){} } realtimeSubscription = supabase.channel('table-changes').on('postgres_changes', { event: 'INSERT', schema: 'public', table: supabaseConfig.tableName }, handleRealtimeUpdate).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: supabaseConfig.tableName }, handleRealtimeUpdate).on('postgres_changes', { event: 'DELETE', schema: 'public', table: supabaseConfig.tableName }, handleRealtimeUpdate).subscribe(status => log('Realtime status: '+status)); }
        function undo(){ if(history.length>1){ history.pop(); const prev=history[history.length-1]; loadTableData(prev.rows); updateUndoButtonState(); log('Annulation effectuée.'); } }

        // Password logic — allow Enter to submit
        function checkPassword(){ const pwd=document.getElementById('password').value; const err=document.getElementById('error-message'); if(pwd===APP_CONFIG.password){ appState.isLoggedIn=true; sessionStorage.setItem('isLoggedIn','1'); document.getElementById('login-container').classList.add('hidden'); document.getElementById('table-container').classList.remove('hidden'); restoreLocalDraft(); ensureDDNHeader(); fetchInitialData(); setupRealtimeSubscription(); startPeriodicSync(); } else { err.textContent='Mot de passe incorrect.'; } }
        document.getElementById('toggle-password').addEventListener('change', function(){ const el=document.getElementById('password'); el.type=this.checked?'text':'password'; });
        document.getElementById('password').addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); checkPassword(); } });

        function downloadExcel(){ const table=document.getElementById('data-table'); const ws=XLSX.utils.table_to_sheet(table); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Staff Data'); XLSX.writeFile(wb, 'Tableau_Staff.xlsx'); showMessage('Excel téléchargé.'); }
        function downloadPDF(){ const { jsPDF } = window.jspdf; const doc=new jsPDF('l','pt','a4'); doc.autoTable({ html: '#data-table' }); doc.save('Tableau_Staff.pdf'); showMessage('PDF téléchargé.'); }
        function downloadImage(){ const table=document.getElementById('data-table'); html2canvas(table).then(canvas=>{ const link=document.createElement('a'); link.href=canvas.toDataURL('image/png'); link.download='Tableau_Staff.png'; link.click(); showMessage('Image téléchargée.'); }); }

        document.addEventListener('keydown', function(e){ const active=document.activeElement; if(active && active.tagName==='TD' && active.contentEditable==='true'){ const modal=document.getElementById('confirmation-modal'); if(modal && !modal.classList.contains('hidden')) return; const row=active.parentElement; const idx=Array.from(row.cells).indexOf(active); let next=null; if(e.key==='ArrowRight' || (e.key==='Tab' && !e.shiftKey)){ next=row.cells[idx+1] || (row.nextElementSibling && row.nextElementSibling.cells[2]); } else if(e.key==='ArrowLeft' || (e.key==='Tab' && e.shiftKey)){ next=row.cells[idx-1]; if((!next || idx===2) && row.previousElementSibling){ next=row.previousElementSibling.cells[row.previousElementSibling.cells.length-1]; } } else if(e.key==='Enter'){ e.preventDefault(); const nx=row.nextElementSibling; if(nx){ next=nx.cells[idx]; } else { addRow(); setTimeout(()=>{ const nr=document.querySelector('#table-body tr:last-child'); if(nr && nr.cells.length>idx) nr.cells[idx].focus(); },0); } } else if(e.key==='ArrowDown'){ const nx=row.nextElementSibling; if(nx){ next=nx.cells[idx]; } else { addRow(); setTimeout(()=>{ const nr=document.querySelector('#table-body tr:last-child'); if(nr && nr.cells.length>idx) nr.cells[idx].focus(); },0); } } else if(e.key==='ArrowUp'){ const pv=row.previousElementSibling; if(pv){ next=pv.cells[idx]; } } if(next){ e.preventDefault(); next.focus(); } } });

        document.addEventListener('keydown', function(e){ const active=document.activeElement; const inCell=active && active.tagName==='TD' && active.contentEditable==='true'; if((e.ctrlKey||e.metaKey) && (e.key==='d'||e.key==='D') && inCell){ e.preventDefault(); const row=active.closest('tr'); if(row){ const clone=row.cloneNode(true); delete clone.dataset.key; if(clone.cells[0]) clone.cells[0].textContent=document.querySelectorAll('#table-body tr').length+1; Array.from(clone.cells).forEach((c,i)=>{ if(i<=1) return; c.addEventListener('input',()=>{ saveStateToHistory(); saveLocalDraft(); markEdited(); }); }); row.after(clone); saveStateToHistory(); saveLocalDraft(); markEdited(); }} if((e.ctrlKey||e.metaKey) && (e.key==='Backspace'||e.key==='Delete') && inCell){ e.preventDefault(); const selected=Array.from(document.querySelectorAll('#table-body tr.selected-row')); if(selected.length>0){ promptKeyConfirm(`Appuyez sur Entrée pour supprimer ${selected.length} ligne(s), Échap pour annuler.`,()=>deleteRows(selected)); } else { const row=active.closest('tr'); if(row){ promptKeyConfirm('Appuyez sur Entrée pour supprimer cette ligne, Échap pour annuler.',()=>deleteRows([row])); } } } });

        document.getElementById('table-body').addEventListener('paste', function(e){
          const active=document.activeElement;
          if(!(active && active.tagName==='TD' && active.contentEditable==='true')) return;
          const text=(e.clipboardData||window.clipboardData).getData('text');
          if(!text || (text.indexOf('\t')===-1 && text.indexOf('\n')===-1)) return;
          e.preventDefault();
          const rows=text.split(/\r?\n/).filter(r=>r.length>0).map(r=>r.split('\t'));
          const startCell=active;
          const startRow=startCell.closest('tr');
          const startIndex=Array.from(startRow.cells).indexOf(startCell);
          let r=startRow;
          rows.forEach((cols,ridx)=>{
            if(ridx>0){
              r=r.nextElementSibling;
              if(!r){
                const tbody=document.getElementById('table-body');
                r=document.createElement('tr');
                r.className='bg-white hover:bg-gray-100 transition-colors cursor-pointer';
                // No
                const n=document.createElement('td');
                n.textContent=tbody.children.length+1;
                n.className='py-2 px-2 md:px-4 font-bold text-gray-800 whitespace-nowrap';
                n.setAttribute('data-label','No');
                r.appendChild(n);
                // Effacer + sélection
                r.appendChild(createDeleteCell(r));
                // Data cells using current headers
                const heads=getHeaders();
                heads.forEach(h=>{ r.appendChild(createEditableCell(h, '')); });
                tbody.appendChild(r);
              }
            }
            cols.forEach((val,cidx)=>{
              const cell=r.cells[startIndex+cidx];
              if(cell && cell.contentEditable==='true'){ cell.textContent=val; }
            });
          });
          saveStateToHistory(); saveLocalDraft(); markEdited();
        });

        let dateInputOverlay=null; document.getElementById('table-body').addEventListener('dblclick', function(e){ const cell=e.target.closest('td'); if(!cell) return; const label=(cell.getAttribute('data-label')||'').toLowerCase(); if(label.includes('date de saisie')||label.includes('ddn')){ if(!dateInputOverlay){ dateInputOverlay=document.createElement('input'); dateInputOverlay.type='date'; dateInputOverlay.className='border rounded px-2 py-1'; dateInputOverlay.style.position='fixed'; dateInputOverlay.style.zIndex='1000'; document.body.appendChild(dateInputOverlay); dateInputOverlay.addEventListener('change',()=>{ const v=dateInputOverlay.value; if(v){ const [y,m,d]=v.split('-'); cell.textContent=`${d}/${m}/${y.slice(-2)}`; saveStateToHistory(); saveLocalDraft(); markEdited(); } dateInputOverlay.style.display='none'; }); dateInputOverlay.addEventListener('blur',()=>{ dateInputOverlay.style.display='none'; }); }
            const rect=cell.getBoundingClientRect(); dateInputOverlay.style.left=`${rect.left+window.scrollX}px`; dateInputOverlay.style.top=`${rect.top+window.scrollY}px`; dateInputOverlay.style.display='block'; dateInputOverlay.focus(); }
        });

        function promptKeyConfirm(message, onConfirm) {
          // Show ephemeral banner
          showMessage(message, 'info');

          // Create (or reuse) a hidden input to trigger the mobile keyboard
          let keyCapture = document.getElementById('key-capture');
          if (!keyCapture) {
            keyCapture = document.createElement('input');
            keyCapture.type = 'text';
            keyCapture.id = 'key-capture';
            keyCapture.autocapitalize = 'off';
            keyCapture.autocomplete = 'off';
            keyCapture.spellcheck = false;
            keyCapture.style.position = 'fixed';
            keyCapture.style.opacity = '0';
            keyCapture.style.width = '1px';
            keyCapture.style.height = '1px';
            keyCapture.style.left = '-10000px';
            keyCapture.style.top = '0';
            keyCapture.style.pointerEvents = 'none';
            document.body.appendChild(keyCapture);
          }
          // Focus to bring up the soft keyboard on mobile
          keyCapture.value = '';
          keyCapture.focus({ preventScroll: true });
          try { keyCapture.setSelectionRange(0, 0); } catch(_) {}
          // Some mobile browsers need a second tick to reliably open the keyboard
          setTimeout(() => { if (document.activeElement !== keyCapture) keyCapture.focus({ preventScroll: true }); }, 0);

          function handleKey(e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              cleanup();
              onConfirm();
            } else if (e.key === 'Escape') {
              e.preventDefault();
              cleanup();
              showMessage('Suppression annulée.', 'info');
            }
          }

          function cleanup() {
            document.removeEventListener('keydown', handleKey, true);
            // Blur and hide the hidden input after finishing
            const cap = document.getElementById('key-capture');
            if (cap) { try { cap.blur(); } catch(_) {} }
          }

          document.addEventListener('keydown', handleKey, true);
        }

        document.addEventListener('change', function(e){ if(e.target && e.target.id==='select-all'){ const checked=e.target.checked; document.querySelectorAll('#table-body tr').forEach(tr=>{ const cb=tr.querySelector('td:nth-child(2) input[type="checkbox"]'); if(cb){ cb.checked=checked; tr.classList.toggle('selected-row', checked); } }); } });

        function saveManually(){ syncToMaster(true); }
        window.checkPassword=checkPassword; window.syncToMaster=syncToMaster; window.addRow=addRow; window.saveManually=saveManually; window.undo=undo; window.downloadExcel=downloadExcel; window.downloadPDF=downloadPDF; window.downloadImage=downloadImage;
        window.addEventListener('load', function(){ const already=sessionStorage.getItem('isLoggedIn')==='1'; if(already){ document.getElementById('login-container').classList.add('hidden'); document.getElementById('table-container').classList.remove('hidden'); restoreLocalDraft(); ensureDDNHeader(); fetchInitialData(); setupRealtimeSubscription(); startPeriodicSync(); } else { document.getElementById('login-container').classList.remove('hidden'); } setInterval(updateClock,1000); });
    </script>
