<!DOCTYPE html>
<html lang='fr'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Tableau de Staff synchronisé - Supabase</title>
    <!-- Tailwind CSS CDN for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji"; }
        #data-table { border-collapse: collapse; border-spacing: 0; margin-bottom: 50px; width: 100%; }
        #data-table th, #data-table td { border: 1px solid #000; }
        #data-table thead { position: sticky; top: 0; z-index: 10; background-color: #15803d; }
        #data-table tfoot { position: sticky; bottom: 0; z-index: 10; background-color: white; border-top: 2px solid #ddd; }
        .sync-pending-animation { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%{opacity:1;} 50%{opacity:.5;} 100%{opacity:1;} }
        .message-box {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem; /* ~12px */
            line-height: 1rem; /* ~16px */
            padding: 4px 8px;
            margin-top: 4px;
            border-radius: .5rem;
            box-shadow: 0 4px 12px rgba(0,0,0,.15);
            z-index:100;
            opacity:0;
            transition: opacity .5s, transform .5s;
        }
        .message-box.show { opacity:1; transform: translateX(-50%) translateY(0); }
        .message-box.success { background-color:#d1fae5; color:#065f46; }
        .message-box.info { background-color:#dbeafe; color:#1e40af; }
        #button-bar { position: absolute; top:8px; right:8px; z-index:20; }

        /* Mobile-safe positioning for the top-right button bar */
        @media (max-width: 640px) {
          #button-bar {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 8px);
            right: 8px;
            z-index: 50;
          }
          /* Laisse de la place sous la barre fixe pour le contenu */
          #table-container { padding-top: 56px; }
        }
        #data-table th:first-child, #data-table td:first-child { position: sticky; left:0; z-index:2; background:#fff; }
        #data-table thead th:first-child { z-index:3; }
        td.editable-cell:empty::after { content: attr(data-label); color:#9ca3af; font-weight: normal; }
        td.editable-cell[data-label="DDN"]:empty::after { content: 'JJ/MM/YYYY'; color:#9ca3af; font-weight: normal; }
        tr.selected-row { background-color:#FEF3C7; }

        /* Slightly lighter dark text for specific columns */
        #data-table td[data-label="Date de saisie"],
        #data-table td[data-label="PEC initiale"],
        #data-table td[data-label="DDN"],
        #data-table td[data-label="Information complementaire"],
        #data-table td[data-label="Numero_tel"] {
            color: #222; /* dark grey instead of pure black */
        }

        /* Column coloring + selection visuals */
        #data-table thead th.col-selected {
            outline: 3px solid #f59e0b; /* amber */
            position: relative;
        }
        #data-table thead th.col-selected::after {
            content: '✓';
            position: absolute; right: 6px; top: 4px;
            font-weight: 700; font-size: 0.8em; color: #1f2937;
        }

        /* Respect des safe areas iOS/Android */
        body {
          padding-top: env(safe-area-inset-top, 0px);
          padding-bottom: env(safe-area-inset-bottom, 0px);
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen overflow-hidden text-sm md:text-base lg:text-lg">

                    <tr>
                        <td colspan="2" class="py-1 px-1">
                            <button class="bg-green-500 text-white font-bold p-3 md:p-4 rounded-full shadow-lg hover:bg-green-600 transition-colors text-xl md:text-2xl w-10 h-10 md:w-12 md:h-12 flex items-center justify-center mx-auto" onclick="addRow()">+</button>

        <div id="confirmation-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 h-full w-full hidden z-50">

                    <div class="mt-4 flex justify-around">

    <!-- Libs -->

    <!-- App -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const APP_CONFIG = { password: 'p123', version: '2.5.4-enter-on-login' };
        const supabaseConfig = { supabaseUrl: 'https://fiecugxopjxzqfdnaqsu.supabase.co', supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpZWN1Z3hvcGp4enFmZG5hcXN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1MDU2NTcsImV4cCI6MjA3MDA4MTY1N30.xd9Thasg4r8Nrwxx5nFwyGB_ufPIvok4XB-78dilpsw', tableName: 'staffTable', primaryKeyColumn: 'No' };


        const supabase = createClient(supabaseConfig.supabaseUrl, supabaseConfig.supabaseAnonKey);
        let realtimeSubscription = null;

        const appState = { isLoggedIn: false, masterSource: 'supabase', dataHash: null, localData: null, serverColumns: null };
let isDirty=false, saveTimeout=null, history=[], historyDebounceTimeout=null, isTyping=false, lastEditAt=0, typingTimer=null, isSyncing=false;
// --- Autosave countdown state ---
const AUTOSAVE_DELAY_MS = 3000; // 3 seconds after last edit when idle
let autosaveTicker = null;
let lastShownCountdown = null; // remember last seconds value we displayed
let lastFocusInfo = null; // remembers the last edited cell and caret offset
let lastCellPos = null; // simple row/cell index memory
let zoomFactor = parseFloat(localStorage.getItem('zoomFactor') || '1');
function updateZoomDisplay(){
  const btn = document.getElementById('zoom-display');
  if (!btn) return;
  const pct = Math.round(zoomFactor * 100);
  btn.textContent = pct + '%';
  btn.title = `Réinitialiser à 100% (actuel : ${pct}%)`;
}
function applyZoom(){
  try {
    const clamped = Math.max(0.3, Math.min(2, zoomFactor));
    zoomFactor = clamped;
    document.documentElement.style.fontSize = (16 * zoomFactor) + 'px';
    localStorage.setItem('zoomFactor', String(zoomFactor));
    updateZoomDisplay();
    // Optional toast, but keep it subtle
    // showMessage(`Zoom: ${Math.round(zoomFactor*100)}%`, 'info');
  } catch(_) {}
}
function zoomIn(){ zoomFactor += 0.1; applyZoom(); }
function zoomOut(){ zoomFactor -= 0.1; applyZoom(); }
function zoomReset(){ zoomFactor = 1; applyZoom(); }

// === Row color state & helpers ===
let currentRowColor = localStorage.getItem('rowColor') || '#FFF59D'; // pastel yellow default
let rowColorMap = {};
try { rowColorMap = JSON.parse(localStorage.getItem('rowColors') || '{}'); } catch(_) { rowColorMap = {}; }
function persistRowColors(){ try { localStorage.setItem('rowColors', JSON.stringify(rowColorMap)); } catch(_) {} }
function setRowColor(tr, color){
  if(!tr) return;
  if(color){ tr.style.backgroundColor = color; tr.dataset.rowColored = '1'; }
  else { tr.style.backgroundColor = ''; tr.dataset.rowColored = '0'; }
}
function keyForRow(tr){
  // Prefer stable primary key if present; else fall back to current visual index (1-based)
  return tr.dataset.key || (Array.from(tr.parentElement.children).indexOf(tr) + 1);
}

function toggleRowColor(tr){
  const key = keyForRow(tr);
  if(tr.dataset.rowColored === '1'){
    setRowColor(tr, null);
    delete rowColorMap[key];
  } else {
    setRowColor(tr, currentRowColor);
    rowColorMap[key] = currentRowColor;
  }
  persistRowColors();
}

// === Drag-to-paint rows ===
let isRowPaintDragging = false;           // true while user is dragging over row numbers
let rowPaintAction = 'color';             // 'color' or 'clear'
function applyRowPaint(row){
  if(!row) return;
  const key = keyForRow(row);
  if(rowPaintAction === 'color'){
    setRowColor(row, currentRowColor);
    rowColorMap[key] = currentRowColor;
  } else {
    setRowColor(row, null);
    delete rowColorMap[key];
  }
  persistRowColors();
}
function startRowPaint(row){
  // Decide whether we're coloring or clearing based on the first row's current state
  rowPaintAction = (row && row.dataset.rowColored === '1') ? 'clear' : 'color';
  isRowPaintDragging = true;
  applyRowPaint(row);
}
function endRowPaint(){ isRowPaintDragging = false; }
// Global end-drag listeners
try { document.addEventListener('mouseup', endRowPaint, true); } catch(_) {}
try { document.addEventListener('touchend', endRowPaint, true); } catch(_) {}
// === Paint mode toggle (Auto/Color/Clear) + first-use hint ===
let paintMode = localStorage.getItem('rowPaintMode') || 'auto'; // 'auto' | 'color' | 'clear'
function getPaintActionForRow(row){
  if(paintMode === 'auto'){
    return (row && row.dataset.rowColored === '1') ? 'clear' : 'color';
  }
  return paintMode; // explicit override
}
function updatePaintModeButton(){
  const btn = document.getElementById('paint-mode-toggle');
  if(!btn) return;
  if(paintMode==='auto'){ btn.textContent = '🖱️'; btn.title = 'Mode de peinture: Auto (P pour changer)'; }
  else if(paintMode==='color'){ btn.textContent = '🖌️'; btn.title = 'Mode de peinture: Colorer (P pour changer)'; }
  else { btn.textContent = '🧽'; btn.title = 'Mode de peinture: Effacer (P pour changer)'; }
}
function cyclePaintMode(){
  paintMode = (paintMode==='auto') ? 'color' : (paintMode==='color' ? 'clear' : 'auto');
  localStorage.setItem('rowPaintMode', paintMode);
  updatePaintModeButton();
  showMessage(`Mode: ${paintMode==='auto'?'Auto':(paintMode==='color'?'Colorer':'Effacer')}`, 'info');
}
// One-time hint about drag-to-paint
function maybeShowFirstUseHint(){
  try {
    if(localStorage.getItem('rowPaintHintShown')==='1') return;
    showMessage('Astuce: cliquez puis faites glisser sur les numéros de ligne pour colorer/effacer.', 'info');
    localStorage.setItem('rowPaintHintShown','1');
  } catch(_) {}
}
// Respect explicit paint mode in drag start by overriding startRowPaint
const _origStartRowPaint = startRowPaint;
startRowPaint = function(row){
  rowPaintAction = getPaintActionForRow(row);
  isRowPaintDragging = true;
  applyRowPaint(row);
};

// Helper to (re)bind the click/drag handler on the No cell for all rows
function rebindRowNumberCells(){
  try {
    const rows = document.querySelectorAll('#table-body tr');
    rows.forEach((row) => {
      const numCell = row.cells && row.cells[0];
      if (!numCell) return;
      // Ensure proper classes/title
      if (!numCell.className.includes('cursor-pointer')) {
        numCell.className += ' cursor-pointer';
      }
      if (!numCell.getAttribute('title')) {
        numCell.title = 'Cliquer pour colorer/effacer la ligne';
      }
      // Replace the cell to drop old listeners
      const newCell = numCell.cloneNode(true);
      // Drag start (mouse)
      newCell.addEventListener('mousedown', (e)=>{ if(e.button!==0) return; startRowPaint(row); e.preventDefault(); });
      // Drag over other rows (mouse)
      newCell.addEventListener('mouseenter', ()=>{ if(isRowPaintDragging) applyRowPaint(row); });
      // Simple toggle on click when not dragging
      newCell.addEventListener('click', (e)=>{ 
        e.preventDefault();
        if(isRowPaintDragging){ return; }
        rowPaintAction = getPaintActionForRow(row);
        applyRowPaint(row);
      });
      // Touch support
      newCell.addEventListener('touchstart', (e)=>{ startRowPaint(row); e.preventDefault(); }, { passive:false });
      newCell.addEventListener('touchmove', (e)=>{
        const t=e.touches && e.touches[0]; if(!t) return; const el=document.elementFromPoint(t.clientX, t.clientY);
        const tr = el ? el.closest('#table-body tr') : null; if(tr) applyRowPaint(tr); e.preventDefault();
      }, { passive:false });
      row.replaceChild(newCell, numCell);
    });
  } catch(_) {}
}

function clearAllRowColors(){
  try {
    const tbody = document.getElementById('table-body');
    Array.from(tbody.querySelectorAll('tr')).forEach(tr => setRowColor(tr, null));
    rowColorMap = {};
    persistRowColors();
    showMessage('Couleurs des lignes effacées.', 'info');
  } catch(_) {}
}
function captureSimplePos(){
  const active = document.activeElement;
  if (!(active && active.tagName === 'TD' && active.isContentEditable)) return;
  const rowEl = active.closest('tr');
  const tbody = document.getElementById('table-body');
  const rowIndex = Array.from(tbody.querySelectorAll('tr')).indexOf(rowEl);
  const cellIndex = Array.from(rowEl.cells).indexOf(active);
  if (rowIndex >= 0 && cellIndex >= 0) lastCellPos = { rowIndex, cellIndex };
  if (lastCellPos) { log(`captureSimplePos -> row=${lastCellPos.rowIndex}, cell=${lastCellPos.cellIndex}`); }
}
// Mobile detection + focus helper (ensures caret inside the cell on phones/tablets)
function isMobile() {
  try { return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent); } catch(_) { return false; }
}

// --- Mobile keyboard helpers ---
function getScrollContainer(){
  return document.getElementById('table-container');
}

function ensureCellVisible(cell){
  try{
    if(!cell) return;
    const sc = getScrollContainer();
    if (!sc) { cell.scrollIntoView({block:'center', inline:'nearest'}); return; }
    const vv = window.visualViewport;
    const rect = cell.getBoundingClientRect();
    const viewportHeight = vv ? vv.height : window.innerHeight;
    const bottomSafe = viewportHeight - 64; // keep ~64px above the keyboard
    if (rect.bottom > bottomSafe || rect.top < 0) {
      const delta = rect.bottom - bottomSafe;
      sc.scrollTop += Math.max(delta, -20);
      try { cell.scrollIntoView({block:'center', inline:'nearest'}); } catch(_) {}
    }
  } catch(_) {}
}

function focusCellWithMobileSupport(cell){
  try {
    // Try to center the cell in view
    try { cell.scrollIntoView({ block: 'center', inline: 'nearest' }); } catch(_) {}
    // Give layout a moment, then simulate a tap and restore caret at end
    setTimeout(() => {
      try {
        cell.dispatchEvent(new Event('pointerdown', { bubbles:true }));
        cell.dispatchEvent(new Event('mousedown',   { bubbles:true }));
        cell.dispatchEvent(new Event('mouseup',     { bubbles:true }));
        cell.click();
        try { cell.focus({ preventScroll: true }); } catch(_) { try { cell.focus(); } catch(__) {} }
        setCaretAt(cell, null);
        // Re-apply on next frames; some mobile browsers steal the first focus
        try {
          requestAnimationFrame(() => {
            setCaretAt(cell, null);
            requestAnimationFrame(() => { setCaretAt(cell, null); });
          });
        } catch(_) {}
        // Final delayed retry so the soft keyboard has time to appear
        setTimeout(() => { setCaretAt(cell, null); }, 250);
      } catch(_) {
        try { cell.focus(); setCaretAt(cell, null); } catch(__) {}
      }
    }, 350);
    // keep the focused cell visible above the keyboard on mobile

            try {
              isSyncing = true;
              log('Auto-sync (500ms poll, 3s idle) vers Supabase…');
              await syncToMaster(false);
            } finally {
              isSyncing = false;

        function loadTableData(data){
          if(!data){ log('Structure invalide','error'); return false; }
          const tbody=document.getElementById('table-body');
          tbody.innerHTML='';
          const headers=getHeaders();
          data.forEach((rowData,index)=>{
            const row=document.createElement('tr');
            row.className='bg-white hover:bg-gray-100 transition-colors cursor-pointer';
            if(rowData[supabaseConfig.primaryKeyColumn]) row.dataset.key=rowData[supabaseConfig.primaryKeyColumn];

            // No
            const numCell=document.createElement('td');
            numCell.textContent=index+1;
            numCell.className='py-2 px-2 md:px-4 font-bold text-gray-800 whitespace-nowrap cursor-pointer';
            numCell.setAttribute('data-label','No');
            numCell.title='Cliquer pour colorer/effacer la ligne';
            // Drag-to-paint + click-to-toggle
            numCell.addEventListener('mousedown', (e)=>{ if(e.button!==0) return; startRowPaint(row); e.preventDefault(); });
            numCell.addEventListener('mouseenter', ()=>{ if(isRowPaintDragging) applyRowPaint(row); });
            numCell.addEventListener('click', (e)=>{ 
              e.preventDefault();
              if(isRowPaintDragging){ return; }
              rowPaintAction = getPaintActionForRow(row);
              applyRowPaint(row);
            });
            numCell.addEventListener('touchstart', (e)=>{ startRowPaint(row); e.preventDefault(); }, { passive:false });
            numCell.addEventListener('touchmove', (e)=>{ const t=e.touches&&e.touches[0]; if(!t) return; const el=document.elementFromPoint(t.clientX,t.clientY); const tr=el?el.closest('#table-body tr'):null; if(tr) applyRowPaint(tr); e.preventDefault(); }, { passive:false });
            row.appendChild(numCell);

            // Effacer + sélection
            row.appendChild(createDeleteCell(row));

            // Data cells
            headers.forEach(header=>{
              let value = rowData[header] || '';
              if (isNomPrenomLabel(header)) value = formatNomPrenom(value);
              row.appendChild(createEditableCell(header, value));
            });

            tbody.appendChild(row);
          });
          // Re-apply stored row colors after rebuilding the tbody
          try {
            Array.from(tbody.querySelectorAll('tr')).forEach(tr => {
              const k = keyForRow(tr);
              const col = rowColorMap[k];
              if(col) setRowColor(tr, col);
            });
          } catch(_) {}
          log('Données du tableau chargées.','success');
          appState.localData=collectTableData();
          appState.dataHash=generateDataHash(appState.localData);
          document.dispatchEvent(new CustomEvent('table:reloaded'));
          log('table:reloaded dispatched');
          return true;
        }

        async function addRow(){
          const tbody=document.getElementById('table-body');
          const row=document.createElement('tr');
          row.className='bg-white hover:bg-gray-100 transition-colors cursor-pointer';

          // No
          const numCell=document.createElement('td');

          numCell.addEventListener('mousedown', (e)=>{ if(e.button!==0) return; startRowPaint(row); e.preventDefault(); });
          numCell.addEventListener('mouseenter', ()=>{ if(isRowPaintDragging) applyRowPaint(row); });
          numCell.addEventListener('click', (e)=>{

            rowPaintAction = getPaintActionForRow(row);

          numCell.addEventListener('touchstart', (e)=>{ startRowPaint(row); e.preventDefault(); }, { passive:false });
          numCell.addEventListener('touchmove', (e)=>{ const t=e.touches&&e.touches[0]; if(!t) return; const el=document.elementFromPoint(t.clientX,t.clientY); const tr=el?el.closest('#table-body tr'):null; if(tr) applyRowPaint(tr); e.preventDefault(); }, { passive:false });

        async function deleteRows(rows){ const keys=rows.map(r=>r.dataset.key).filter(Boolean); try{ if(keys.length>0){ const { error } = await supabase.from(supabaseConfig.tableName).delete().in(supabaseConfig.primaryKeyColumn, keys); if(error) throw error; log(`Supprimé ${keys.length} ligne(s) côté serveur.`,'success'); } rows.forEach(r=>r.remove()); document.querySelectorAll('#table-body tr').forEach((tr,idx)=>{ const noCell=tr.querySelector('td:first-child'); if(noCell) noCell.textContent=idx+1; tr.classList.remove('selected-row'); });
          // Rebuild color map after deletions and renumbering
          rowColorMap = {};
          Array.from(document.querySelectorAll('#table-body tr')).forEach(tr => {
            const k = keyForRow(tr);
            const c = tr.style.backgroundColor;

        async function fetchInitialData(){ log('Chargement des données (full fetch)...'); updateStatus('Connexion...'); try{ const { data, error } = await supabase.from(supabaseConfig.tableName).select('*').order(supabaseConfig.primaryKeyColumn, { ascending: true }); if(error) throw error; if(Array.isArray(data) && data.length>0){ appState.serverColumns = Object.keys(data[0]); }

        async function syncToMaster(isManualSave=false){
          try { if (autosaveTicker) clearInterval(autosaveTicker); } catch(_) {}
          lastShownCountdown = null;
          const modal=document.getElementById('confirmation-modal');
          if(modal && !modal.classList.contains('hidden')){ log('Sync ignorée: modale ouverte.'); return; }
          // Remember which cell and caret position were active before saving
          captureFocusInfo();
          captureSimplePos();
          if(isManualSave && saveTimeout){ clearTimeout(saveTimeout); }
          const current=collectTableData();
          const currentHash=generateDataHash(current);
          let rowsForSync=current.rows.map(row=>{ if(!appState.serverColumns) return row; const allowed=new Set([supabaseConfig.primaryKeyColumn, ...appState.serverColumns]); const filtered={}; for(const k in row){ if(allowed.has(k)) filtered[k]=row[k]; } return filtered; });
          if(!isManualSave && currentHash===appState.dataHash){ log('Pas de changement détecté.'); isDirty=false; updateStatus('Synchronisé','success'); return; }
          log('Synchronisation des données vers Supabase...');
          updateStatus('Sauvegarde en cours...','saving');
          isDirty=false;
          try{
            const updates=rowsForSync.filter(r=>r[supabaseConfig.primaryKeyColumn]);
            const inserts=rowsForSync.filter(r=>!r[supabaseConfig.primaryKeyColumn]);
            let error=null;
            if(inserts.length>0){
              const { error: insertError } = await supabase.from(supabaseConfig.tableName).insert(inserts);
              if(insertError) error=insertError;
            }
            if(updates.length>0 && !error){
              const { error: updateError } = await supabase.from(supabaseConfig.tableName).upsert(updates, { onConflict: supabaseConfig.primaryKeyColumn });
              if(updateError) error=updateError;
            }
            if(error) throw error;
            updateStatus('Sauvegardé','success');
            updateLastSaveTime();
            log(`syncToMaster -> set restore listener (lastCellPos=${JSON.stringify(lastCellPos)}, lastFocusInfo.col=${lastFocusInfo?lastFocusInfo.colLabel:''})`);
            await new Promise((resolve) => {
              const restoreOnce = () => {
                log('syncToMaster -> table:reloaded caught; attempting focus restore');
                document.removeEventListener('table:reloaded', restoreOnce);
                // Try simple row/cell index first ("as simple as this")
                if (!focusCellByPos(lastCellPos)) {
                  // Fallback to the richer label+caret based restore
                  if (!focusCellFromInfo(lastFocusInfo)) {
                    setTimeout(() => { if (!focusCellByPos(lastCellPos) && !focusCellFromInfo(lastFocusInfo)) { setTimeout(() => { focusCellByPos(lastCellPos) || focusCellFromInfo(lastFocusInfo); }, 250); } }, 50);
                  }
                }
                // Try again on the next animation frames as some browsers steal focus once after layout
                try {
                  requestAnimationFrame(() => {
                    focusCellByPos(lastCellPos) || focusCellFromInfo(lastFocusInfo);
                    requestAnimationFrame(() => { focusCellByPos(lastCellPos) || focusCellFromInfo(lastFocusInfo); });
                  });
                } catch(_) {}
                // Final delayed retry in case layout settles after a tick
                setTimeout(() => { focusCellByPos(lastCellPos) || focusCellFromInfo(lastFocusInfo); }, 300);
                resolve();
              };
              document.addEventListener('table:reloaded', restoreOnce, { once: true });
              fetchInitialData();
            });
          } catch(e){
            log('Erreur de sauvegarde : '+e.message,'error');
            updateStatus('Erreur de sauvegarde','error');
          }
        }

        async function pullFromMaster(){ log('Récupération des dernières données...'); await fetchInitialData(); }
        function handleRealtimeUpdate(){
          log('Mise à jour en temps réel reçue.');
          if (isDirty) { log('Modifs locales en attente, on ignore.'); return; }
          // Try to preserve focus across realtime-driven reload as well
          captureFocusInfo();
          captureSimplePos();
          const onReload = () => {
            log('realtime -> table:reloaded caught; attempting focus restore');
            document.removeEventListener('table:reloaded', onReload);
            focusCellByPos(lastCellPos) || focusCellFromInfo(lastFocusInfo);

        });

document.addEventListener('keydown', function(e){ const active=document.activeElement; if(active && active.tagName==='TD' && active.contentEditable==='true'){ const modal=document.getElementById('confirmation-modal'); if(modal && !modal.classList.contains('hidden')) return; const row=active.parentElement; const idx=Array.from(row.cells).indexOf(active); let next=null; if(e.key==='ArrowRight' || (e.key==='Tab' && !e.shiftKey)){ next=row.cells[idx+1] || (row.nextElementSibling && row.nextElementSibling.cells[2]); } else if(e.key==='ArrowLeft' || (e.key==='Tab' && e.shiftKey)){ next=row.cells[idx-1]; if((!next || idx===2) && row.previousElementSibling){ next=row.previousElementSibling.cells[row.previousElementSibling.cells.length-1]; } } else if(e.key==='Enter'){ e.preventDefault(); const nx=row.nextElementSibling; if(nx){ next=nx.cells[idx]; } else { addRow(); setTimeout(()=>{ const nr=document.querySelector('#table-body tr:last-child'); if(nr && nr.cells.length>idx) nr.cells[idx].focus(); },0); } } else if(e.key==='ArrowDown'){ const nx=row.nextElementSibling; if(nx){ next=nx.cells[idx]; } else { addRow(); setTimeout(()=>{ const nr=document.querySelector('#table-body tr:last-child'); if(nr && nr.cells.length>idx) nr.cells[idx].focus(); },0); } } else if(e.key==='ArrowUp'){ const pv=row.previousElementSibling; if(pv){ next=pv.cells[idx]; } } if(next){

document.addEventListener('keydown', function(e){
  const active=document.activeElement;
  const inCell=active && active.tagName==='TD' && active.contentEditable==='true';
  // Shortcut: cycle paint mode with P
  if(!e.ctrlKey && !e.metaKey && !e.altKey && (e.key==='p' || e.key==='P')){ e.preventDefault(); cyclePaintMode(); return; }
  if((e.ctrlKey||e.metaKey) && (e.key==='d'||e.key==='D') && inCell){
    e.preventDefault();
    const row=active.closest('tr');
    if(row){
      const clone=row.cloneNode(true);
      delete clone.dataset.key;
      // Clear any background color on the clone (start uncolored)
      clone.style.backgroundColor = '';
      // Fix the No cell text and rebind click handler
      if(clone.cells[0]){
        clone.cells[0].textContent=document.querySelectorAll('#table-body tr').length+1;
      }
      // Rebind the line-number toggle and input handlers
      const numCell = clone.cells[0];
      if (numCell) {
        // Replace to remove any old listeners and add our toggle
        const newNum = numCell.cloneNode(true);
        if (!newNum.className.includes('cursor-pointer')) newNum.className += ' cursor-pointer';
        newNum.title = 'Cliquer pour colorer/effacer la ligne';
        newNum.addEventListener('click', ()=> toggleRowColor(clone));
        clone.replaceChild(newNum, numCell);
      }
      Array.from(clone.cells).forEach((c,i)=>{
        if(i<=1) return;
        c.addEventListener('input',()=>{ saveStateToHistory(); saveLocalDraft(); markEdited(); });
      });
      row.after(clone);
      // Update color map persistently: cloned row starts without color
      persistRowColors();
      saveStateToHistory(); saveLocalDraft(); markEdited();
    }
  }
  if((e.ctrlKey||e.metaKey) && (e.key==='Backspace'||e.key==='Delete') && inCell){
    e.preventDefault();
    const selected=Array.from(document.querySelectorAll('#table-body tr.selected-row'));
    if(selected.length>0){
      promptKeyConfirm(`Appuyez sur Entrée pour supprimer ${selected.length} ligne(s), Échap pour annuler.`,()=>deleteRows(selected));
    } else {
      const row=active.closest('tr');
      if(row){
        promptKeyConfirm('Appuyez sur Entrée pour supprimer cette ligne, Échap pour annuler.',()=>deleteRows([row]));
      }
    }
  }
});

        function promptKeyConfirm(message, onConfirm) {
          // Show ephemeral banner
          showMessage(message, 'info');

          // Create (or reuse) a hidden input to trigger the mobile keyboard
          let keyCapture = document.getElementById('key-capture');
          if (!keyCapture) {
            keyCapture = document.createElement('input');
            keyCapture.type = 'text';
            keyCapture.id = 'key-capture';
            keyCapture.autocapitalize = 'off';
            keyCapture.autocomplete = 'off';
            keyCapture.spellcheck = false;
            keyCapture.style.position = 'fixed';
            keyCapture.style.opacity = '0';
            keyCapture.style.width = '1px';
            keyCapture.style.height = '1px';
            keyCapture.style.left = '-10000px';
            keyCapture.style.top = '0';
            keyCapture.style.pointerEvents = 'none';
            document.body.appendChild(keyCapture);
          }
          // Focus to bring up the soft keyboard on mobile
          keyCapture.value = '';
          keyCapture.focus({ preventScroll: true });
          try { keyCapture.setSelectionRange(0, 0); } catch(_) {}
          // Some mobile browsers need a second tick to reliably open the keyboard
          setTimeout(() => { if (document.activeElement !== keyCapture) keyCapture.focus({ preventScroll: true }); }, 0);

          function handleKey(e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              cleanup();
              onConfirm();
            } else if (e.key === 'Escape') {
              e.preventDefault();
              cleanup();
              showMessage('Suppression annulée.', 'info');
            }
          }

          function cleanup() {
            document.removeEventListener('keydown', handleKey, true);
            // Blur and hide the hidden input after finishing
            const cap = document.getElementById('key-capture');
            if (cap) { try { cap.blur(); } catch(_) {} }
          }

          document.addEventListener('keydown', handleKey, true);
        }
